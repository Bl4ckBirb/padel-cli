services:
  padel:
    build:
      context: .
    image: padel-cli:latest
    container_name: padel-dashboard
    restart: unless-stopped
    # Bind to 127.0.0.1 on the host so the dashboard is only reachable locally.
    # Inside the container the server still listens on 0.0.0.0:8080 (set in CMD).
    # Flip to "8080:8080" to expose on the LAN.
    ports:
      - "127.0.0.1:8080:8080"
    # Mount the same config dir the CLI uses so bookings.db and credentials.json
    # are shared between host CLI runs and the dashboard.
    volumes:
      - ${PADEL_CONFIG_DIR:-${HOME}/.config/padel}:/home/padel/.config/padel
    environment:
      TZ: ${PADEL_TZ:-Europe/Berlin}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  watch:
    image: padel-cli:latest
    container_name: padel-watch
    restart: unless-stopped
    volumes:
      - ${PADEL_CONFIG_DIR:-${HOME}/.config/padel}:/home/padel/.config/padel
    environment:
      TZ: ${PADEL_TZ:-Europe/Berlin}
    # All watch parameters come from .env so you don't need to edit this file.
    # Required: WATCH_VENUES, WATCH_DATE, WATCH_TIME
    # Optional: WATCH_DURATION (default 90), WATCH_INTERVAL (default 3m)
    command:
      - watch
      - --venues
      - ${WATCH_VENUES:?set WATCH_VENUES in .env}
      - --date
      - ${WATCH_DATE:?set WATCH_DATE in .env}
      - --time
      - ${WATCH_TIME:?set WATCH_TIME in .env}
      - --duration
      - "${WATCH_DURATION:-90}"
      - --interval
      - "${WATCH_INTERVAL:-3m}"
