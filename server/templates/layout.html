{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{.Title}} — padel</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #58a6ff;
      --green: #3fb950;
      --amber: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      margin-right: 18px;
    }
    header nav a:hover, header nav a.active { color: var(--text); }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    h2 { font-size: 18px; margin: 0 0 16px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 6px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(110, 118, 129, 0.1); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .badge-green { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-amber { background: rgba(210, 153, 34, 0.15); color: var(--amber); }
    .badge-red { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge-muted { background: rgba(110, 118, 129, 0.15); color: var(--muted); }
    .empty { color: var(--muted); padding: 40px; text-align: center; background: var(--panel); border-radius: 6px; }
    .row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    button, .button {
      background: var(--link);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
    select, input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; }
    pre { background: var(--panel); padding: 16px; border-radius: 6px; overflow-x: auto; }
    .stream { height: 360px; overflow-y: auto; }
  </style>
</head>
<body>
  <header>
    <h1>padel</h1>
    <nav>
      <a href="/" {{if eq .Active "dashboard"}}class="active"{{end}}>Dashboard</a>
      <a href="/audit" {{if eq .Active "audit"}}class="active"{{end}}>Audit</a>
      <a href="/run" {{if eq .Active "run"}}class="active"{{end}}>Run</a>
    </nav>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
